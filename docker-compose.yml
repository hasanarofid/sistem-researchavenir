version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    container_name: avenir-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      - DB_CONNECTION=pgsql
      # Supabase Remote Connection (Commented Out)
      # - DB_HOST=${SUPABASE_DB_HOST:-aws-0-ap-southeast-1.pooler.supabase.com}
      # - DB_PORT=${SUPABASE_DB_PORT:-6543}
      # - DB_DATABASE=${SUPABASE_DB_NAME:-postgres}
      # - DB_USERNAME=${SUPABASE_DB_USER:-postgres.your_supabase_project_id}
      # - DB_PASSWORD=${SUPABASE_DB_PASSWORD:-your_supabase_password}

      # Local PostgreSQL Connection
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=hasanitki
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: avenir-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: avenir_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hasanitki
    volumes:
      - avenir-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    image: nginx:alpine
    container_name: avenir-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  avenir-pgdata:
